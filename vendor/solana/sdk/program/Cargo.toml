[package]
name = "solana-program"
description = "Solana Program"
version = "1.18.26"
authors = [
	"Solana Labs Maintainers <maintainers@solanalabs.com>",
	"Haderech Pte. Ltd.",
]
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/noirhq/noir.git"
publish = false

[dependencies]
base64 = { version = "0.22", default-features = false, features = ["alloc"] }
bincode = { version = "2.0.0-rc.3", default-features = false, features = ["alloc", "serde"] }
bitflags = { version = "2.6", default-features = false }
blake3 = { version = "1.5", default-features = false, features = ["traits-preview"] }
borsh = { version = "1.5", default-features = false, features = ["derive", "unstable__schema"] }
bs58 = { version = "0.5", default-features = false, features = ["alloc"] }
bytemuck = { version = "1.14", features = ["derive"] }
curve25519-dalek = { version = "4.1", optional = true }
hashbrown = "0.15"
itertools = { version = "0.13.0", default-features = false, features = ["use_alloc"] }
libsecp256k1 = { version = "0.7", default-features = false, features = ["static-context"] }
log = { version = "0.4.2", default-features = false }
memoffset = "0.9"
num-derive = "0.4.2"
num-traits = { version = "0.2", default-features = false }
rand = { version = "0.8", optional = true }
rustversion = "1.0"
serde = { version = "1.0", default-features = false, features = ["derive"], optional = true }
serde_bytes = { version = "0.11", default-features = false }
serde_derive = "1.0"
sha2 = { version = "0.10", default-features = false }
sha3 = { version = "0.10", default-features = false }
thiserror = { version = "2.0", default-features = false }

bv = { workspace = true, features = ["serde"] }
solana-frozen-abi-macro = { workspace = true }
solana-sdk-macro = { workspace = true }

[dev-dependencies]
anyhow = "1.0"
assert_matches = "1.5"
serde_json = "1.0"
static_assertions = "1.1"

[features]
default = ["std"]
std = [
	"base64/std",
	"bincode/std",
	"bitflags/std",
	"blake3/std",
	"borsh/std",
	"bs58/std",
	"bv/std",
	"curve25519-dalek",
	"itertools/use_std",
	"libsecp256k1/std",
	"log/std",
	"rand",
	"num-traits/std",
	"serde/std",
	"serde_bytes/std",
	"sha2/std",
	"sha3/std",
	"thiserror/std",
]
serde = [
	"dep:serde",
	"bincode/alloc",
	"bincode/serde",
]
