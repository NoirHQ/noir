[package]
name = "solana-sdk"
description = "Solana SDK"
version = "1.18.26"
authors = [
	"Solana Labs Maintainers <maintainers@solanalabs.com>",
	"Haderech Pte. Ltd.",
]
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/noirhq/noir.git"
publish = false

[dependencies]
#base64 = { version = "0.22", default-features = false, features = ["alloc"] }
#bincode = { version = "2.0.0-rc.3", default-features = false, features = ["serde"] }
#borsh = { version = "1.5", default-features = false, features = ["derive", "unstable__schema"] }
bs58 = { version = "0.5", default-features = false }
#bytemuck = { version = "1.19", features = ["derive"] }
#curve25519-dalek = { version = "4.1", optional = true }
#itertools = { version = "0.13.0", default-features = false, features = ["use_alloc"] }
log = { version = "0.4", default-features = false }
#num-derive = "0.4.2"
#num-traits = { version = "0.2", default-features = false }
rand = { version = "0.8", optional = true }
rustversion = "1.0"
serde = { version = "1.0", default-features = false, features = ["derive"], optional = true }
serde_derive = "1.0"
serde_json = { version = "1.0", optional = true }
#sha2 = { version = "0.10", default-features = false }
thiserror = { version = "2.0", default-features = false }

solana-program = { workspace = true }
solana-sdk-macro = { workspace = true }

[features]
default = ["std", "full"]
std = [
	"bs58/std",
	"log/std",
	"rand",
	"serde/std",
	"serde_json",
	"solana-program/std",
	"thiserror/std",
]
full = []
serde = [
	"dep:serde",
]
