[package]
name = "solana-sdk"
description = "Solana SDK"
version = "1.18.26"
authors = [
	"Solana Labs Maintainers <maintainers@solanalabs.com>",
	"Haderech Pte. Ltd.",
]
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/noirhq/noir.git"
publish = false

[dependencies]
#base64 = { version = "0.22", default-features = false, features = ["alloc"] }
bincode = { version = "2.0.0-rc.3", default-features = false, features = ["serde"] }
borsh = { version = "1.5", default-features = false, features = ["derive", "unstable__schema"] }
bs58 = { version = "0.5", default-features = false }
bytemuck = { version = "1.14", features = ["derive"] }
core2 = { version = "0.4.0", default-features = false, features = ["alloc"] }
ed25519-dalek = { version = "2.1.1", default-features = false, features = ["alloc"] }
#curve25519-dalek = { version = "4.1", optional = true }
generic-array = { version = "1.1.0", default-features = false, features = ["alloc", "serde"] }
hashbrown = "0.15"
itertools = { version = "0.13.0", default-features = false, features = ["use_alloc"] }
lazy_static = { version = "1.5.0", default-features = false, features = ["spin_no_std"] }
libsecp256k1 = { version = "0.7", default-features = false }
log = { version = "0.4.2", default-features = false }
#num-derive = "0.4.2"
#num-traits = { version = "0.2", default-features = false }
qualifier_attr = { version = "0.2.2", default-features = false,  optional = true }
rand = { version = "0.8", optional = true }
rustversion = "1.0"
serde = { version = "1.0", default-features = false, features = ["derive"], optional = true }
serde_bytes = { version = "0.11.15", default-features = false, features = ["alloc"] }
serde_derive = "1.0"
serde_json = { version = "1.0", optional = true }
#sha2 = { version = "0.10", default-features = false }
sha3 = { version = "0.10.8", default-features = false }
thiserror = { version = "2.0", default-features = false }

solana-program = { workspace = true, default-features = false }
solana-sdk-macro = { workspace = true }
solana-frozen-abi-macro = { workspace = true }

[features]
default = ["std", "full"]
std = [
	"borsh/std",
	"bs58/std",
	"core2/std",
	"ed25519-dalek/std",
	"itertools/use_std",
	"libsecp256k1/std",
	"log/std",
	"rand",
	"serde/std",
	"serde_bytes/std",
	"serde_json",
	"sha3/std",
	"solana-program/std",
	"thiserror/std",
]
full = []
dev-context-only-utils = [
	"qualifier_attr",
]
serde = [
	"dep:serde",
]
