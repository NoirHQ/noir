[package]
name = "solana-sdk-macro"
description = "Solana SDK Macro"
version = "1.18.26"
authors = [
	"Solana Labs Maintainers <maintainers@solanalabs.com>",
	"Haderech Pte. Ltd.",
]
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/noirhq/noir.git"
publish = false

[lib]
proc-macro = true

[dependencies]
bs58 = "0.5"
proc-macro2 = "1.0"
quote = "1.0"
rustversion = "1.0"
syn = { version = "2.0", features = ["full", "extra-traits"] }
