[package]
name = "solana-program-runtime"
description = "Solana program runtime"
version = "1.18.26"
authors = [
	"Solana Labs Maintainers <maintainers@solanalabs.com>",
	"Haderech Pte. Ltd.",
]
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/noirhq/noir.git"
publish = false

[dependencies]
log = { version = "0.4.21", default-features = false }
serde = { version = "1.0", default-features = false, features = ["derive"], optional = true }

solana_rbpf = { git = "https://github.com/code0xff/rbpf", branch = "no_std" }
solana-sdk = { workspace = true, features = ["full"] }

[features]
default = ["std"]
std = [
	"log/std",
	"serde/std",
	"solana_rbpf/std",
	"solana-sdk/std",
]
serde = [
	"dep:serde",
]
