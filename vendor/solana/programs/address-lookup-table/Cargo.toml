[package]
name = "solana-address-lookup-table-program"
description = "Solana address lookup table program"
documentation = "https://docs.rs/solana-address-loookup-table-program"
version = "1.18.26"
authors = ["Solana Labs Maintainers <maintainers@solanalabs.com>"]
repository = "https://github.com/solana-labs/solana"
homepage = "https://solanalabs.com/"
license = "Apache-2.0"
edition = "2021"

[dependencies]
# bincode = { workspace = true }
bytemuck = { version = "1.14", features = ["derive"] }
log = { version = "0.4.21", default-features = false }
num-derive = "0.4.2"
num-traits = { version = "0.2", default-features = false }
serde = { version = "1.0.210", default-features = false, features = ["derive"] }
# solana-frozen-abi = { workspace = true }
solana-frozen-abi-macro = { workspace = true }
solana-program = { workspace = true, default-features = false }
thiserror = { version = "2.0", default-features = false }
solana-program-runtime = { workspace = true, default-features = false }
solana-sdk = { workspace = true, default-features = false }

# [build-dependencies]
# rustc_version = { workspace = true }

[features]
default = ["std"]
std = [
    "log/std",
    "num-traits/std",
    "serde/std",
    "solana-program/std",
    "solana-program-runtime/std",
    "solana-sdk/std",
]

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]
