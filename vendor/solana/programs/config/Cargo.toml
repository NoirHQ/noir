[package]
name = "solana-config-program"
description = "Solana Config program"
documentation = "https://docs.rs/solana-config-program"
version = "1.18.26"
authors = ["Solana Labs Maintainers <maintainers@solanalabs.com>"]
repository = "https://github.com/solana-labs/solana"
homepage = "https://solanalabs.com/"
license = "Apache-2.0"
edition = "2021"

[dependencies]
# bincode = { workspace = true }
chrono = { version = "0.4.31", default-features = false, features = [
    "alloc",
    "serde",
] }
serde = { version = "1.0.210", default-features = false }
serde_derive = "1.0"
solana-program = { workspace = true, default-features = false }
solana-program-runtime = { workspace = true, default-features = false }
solana-sdk = { workspace = true, default-features = false }

[dev-dependencies]
solana-logger = "1.18.26"

[features]
default = ["std"]
std = [
    "chrono/std",
    "serde/std",
    "solana-program/std",
    "solana-program-runtime/std",
    "solana-sdk/std",
]

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]
