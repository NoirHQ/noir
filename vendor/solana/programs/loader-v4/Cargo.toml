[package]
name = "solana-loader-v4-program"
description = "Solana BPF loader"
documentation = "https://docs.rs/solana-bpf-loader-program"
version = "1.18.26"
authors = ["Solana Labs Maintainers <maintainers@solanalabs.com>"]
repository = "https://github.com/solana-labs/solana"
homepage = "https://solanalabs.com/"
license = "Apache-2.0"
edition = "2021"

[dependencies]
log = { version = "0.4.2", default-features = false }
# solana-measure = { workspace = true }
solana-program-runtime = { workspace = true, default-features = false }
solana-sdk = { workspace = true, default-features = false }
solana_rbpf = { workspace = true, default-features = false }

[dev-dependencies]
bincode = "1.3.3"

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[features]
default = ["std"]
std = [
    "log/std",
    "solana-program-runtime/std",
    "solana-sdk/std",
    "solana_rbpf/std",
]