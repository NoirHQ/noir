[package]
name = "solana-bpf-loader-program"
description = "Solana BPF loader"
documentation = "https://docs.rs/solana-bpf-loader-program"
version = "1.18.26"
authors = ["Solana Labs Maintainers <maintainers@solanalabs.com>"]
repository = "https://github.com/solana-labs/solana"
homepage = "https://solanalabs.com/"
license = "Apache-2.0"
edition = "2021"

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
byteorder = { version = "1.5", default-features = false }
core2 = { version = "0.4.0", default-features = false, features = ["alloc"] }
libsecp256k1 = { version = "0.7", default-features = false }
log = { version = "0.4.2", default-features = false }
scopeguard = { version = "1.2", default-features = false }
# solana-measure = { workspace = true }
solana-program-runtime = { workspace = true, default-features = false }
solana-sdk = { workspace = true, default-features = false }
# solana-zk-token-sdk = { workspace = true }
solana_rbpf = { workspace = true, default-features = false }
thiserror = { version = "2.0", default-features = false }

[dev-dependencies]
bincode = "1.3.3"
assert_matches = "1.5"
memoffset = "0.9"
rand = "0.8.5"
solana-sdk = { workspace = true, features = ["dev-context-only-utils"] }
test-case = "3.3.1"

[features]
default = ["std"]
std = [
    "byteorder/std",
    "core2/std",
    "libsecp256k1/std",
    "log/std",
    "scopeguard/use_std",
    "solana-program-runtime/std",
    "solana-sdk/std",
    "solana_rbpf/std",
    "thiserror/std",
]
